name: Keep Qaabil Alive

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:      

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Streamlit and Render
        run: |
          curl -s -m 10 https://kaabil-ai-web.streamlit.app/ || true
          curl -s -m 10 https://qaabil-ai-web-platform.onrender.com/ || true
